# CLI 增强功能配置 / CLI Enhancement Configuration
# 版本 / Version: 2.1.16

# 输入系统配置 / Input System Configuration
input:
  # 历史补全配置 / History completion config
  history:
    enabled: true
    max_size: 1000
    file: "~/.alonework/history.yaml"
    bang_mode: true
  
  # 外部编辑器配置 / External editor config
  editor:
    auto_detect: true
    default_windows: "notepad"
    default_linux: "vim"
    default_macos: "vim"
    timeout_seconds: 300

# 后台任务配置 / Background Task Configuration
background:
  enabled: true
  max_concurrent: 5
  default_timeout: 300
  auto_background_threshold: 30
  storage_file: "~/.alonework/background_tasks.yaml"
  
  # 后台智能体配置 / Background agent config
  agent:
    enabled: true
    notify_on_complete: true
    save_results: true

# 任务管理配置 / Task Management Configuration
task_manager:
  enabled: true
  storage_file: "~/.alonework/tasks.yaml"
  
  # 依赖追踪配置 / Dependency tracking config
  dependency:
    detect_cycles: true
    auto_resolve: true

# 待办事项配置 / Todo Configuration
todo:
  enabled: true
  storage_file: "~/.alonework/todos.yaml"
  default_priority: "medium"
  auto_save: true

# LSP 配置 / LSP Configuration
lsp:
  enabled: true
  
  # 语言服务器配置 / Language server config
  servers:
    python:
      command: "pylsp"
      args: []
    typescript:
      command: "typescript-language-server"
      args: ["--stdio"]
    javascript:
      command: "typescript-language-server"
      args: ["--stdio"]
    go:
      command: "gopls"
      args: []
    rust:
      command: "rust-analyzer"
      args: []

# 快捷键配置 / Keybindings Configuration
keybindings:
  ctrl_b: "background"
  ctrl_g: "external_editor"
  ctrl_c: "interrupt"

# 自动后台化配置 / Auto-background Configuration
auto_background:
  enabled: true
  # 超过此秒数的任务自动后台化 / Tasks exceeding this duration are auto-backgrounded
  timeout_threshold: 30
  # 提示用户确认 / Prompt user for confirmation
  prompt_user: false
