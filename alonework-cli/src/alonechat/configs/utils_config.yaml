      aliases:
        - "ef"
      usage: "/effort [low|medium|high|max|auto]"
      examples:
        - "/effort"
        - "/effort high"
    files:
      description: "列出当前上下文中的文件 / List files in context"
      aliases:
        - "f"
      usage: "/files [add|remove|list] [path]"
      examples:
        - "/files"
        - "/files add src/main.py"
    hooks:
      description: "查看工具事件钩子配置 / View hook configurations"
      aliases:
        - "hk"
      usage: "/hooks [list|test|reset]"
      examples:
