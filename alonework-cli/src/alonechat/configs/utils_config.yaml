        - "/hooks list"
    memory:
      description: "编辑记忆文件 / Edit memory files"
      aliases:
        - "mem"
      usage: "/memory [show|edit|add|clear] [content]"
      examples:
        - "/memory"
        - "/memory add 记住使用中文回复"
    rename:
      description: "重命名当前会话 / Rename current session"
      aliases:
        - "rn"
      usage: "/rename [new_name]"
      examples:
        - "/rename 我的项目会话"
    resume:
      description: "恢复之前的会话 / Resume previous session"
      aliases:
        - "res"
      usage: "/resume [session_id|title]"
      examples:
        - "/resume"
        - "/resume abc123"
    session:
      description: "会话管理 / Session management"
      aliases:
        - "ses"
      usage: "/session [list|info|delete|export]"
      examples:
        - "/session"
        - "/session list"
    skills:
      description: "管理技能 / Manage skills"
      aliases:
        - "sk"
      usage: "/skills [list|install|remove|reload]"
      examples:
        - "/skills"
        - "/skills list"
    tasks:
      description: "管理后台任务 / Manage background tasks"
      aliases:
        - "t"
      usage: "/tasks [list|status|stop|clean]"
      examples:
        - "/tasks"
        - "/tasks list"
    tag:
      description: "管理会话标签 / Manage session tags"
      aliases: []
      usage: "/tag [add|remove|list] [tag_name]"
      examples:
        - "/tag"
        - "/tag add feature"
    theme:
      description: "切换主题 / Switch theme"
      aliases: []
      usage: "/theme [dark|light|monokai|list]"
      examples:
        - "/theme"
        - "/theme dark"
    color:
      description: "设置代理颜色 / Set agent color"
      aliases: []
      usage: "/color [set|reset|list] [color]"
      examples:
        - "/color"
        - "/color set cyan"
    feedback:
      description: "发送反馈 / Send feedback"
      aliases:
        - "fb"
      usage: "/feedback [message]"
      examples:
        - "/feedback 挺好用的！"
    fast:
      description: "切换快速模式 / Toggle fast mode"
      aliases: []
      usage: "/fast [on|off|status]"
      examples:
        - "/fast"
        - "/fast on"
    output-style:
      description: "设置输出样式 / Set output style"
      aliases:
        - "os"
      usage: "/output-style [dark|light|monokai|compact|verbose]"
      examples:
        - "/output-style"
        - "/output-style dark"
    share:
      description: "分享会话 / Share session"
      aliases: []
      usage: "/share [link|file|clipboard]"
      examples:
        - "/share"
        - "/share file"
    stickers:
      description: "趣味贴纸 / Fun stickers"
      aliases:
        - "sticker"
      usage: "/stickers [list|random|send] [name]"
      examples:
        - "/stickers"
        - "/stickers random"
    upgrade:
      description: "升级AloneWork CLI / Upgrade AloneWork CLI"
      aliases:
        - "update"
      usage: "/upgrade [check|install|changelog]"
      examples:
        - "/upgrade"
        - "/upgrade check"

history:
  default_max_size: 100
  history_dir: ".alonechat"
  history_file: "history.json"

autocompleter:
  min_partial_length: 3
  max_context_size: 100
  max_suggestions: 10
  max_matches_per_context: 3

ui:
  styles:
    cyan: "cyan"
    green: "green"
    red: "red"
    yellow: "yellow"
    blue: "blue"
    dim: "dim"
    bold: "bold"

# ============================================================
# CLI增强配置 / CLI Enhancement Configuration
# ============================================================

# 流式输出配置 / Streaming Output Configuration
streaming:
  enabled: true
  line_buffering: true
  reasoning_prefix:
    - "[思考]"
    - "[reasoning]"
  default_spinner: "dots"

# 终端通知配置 / Terminal Notification Configuration
notifications:
  enabled: true
  tmux_support: true
  iterm2_popup: true
  kitty_popup: true
  ghostty_popup: true
  system_notifications: true
  max_message_length: 200

# 超链接配置 / Hyperlink Configuration
hyperlinks:
  enabled: true
  osc8_support: true
  file_path_pattern: "(?:[A-Za-z]:\\|/)?(?:[\\w\\-. ]+[\\\\/])+[\\w\\-. ]+\\.\\w+(?::\\d+)?"
  wrap_file_paths: true

# 图片链接配置 / Image Link Configuration
images:
  enabled: true
  open_in_viewer: true
  supported_extensions:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".gif"
    - ".bmp"
    - ".svg"
    - ".webp"
  image_ref_pattern: '\[Image\s*(?:#|No\.)?\s*(\d+)\]'

# 思维块配置 / Thinking Block Configuration
thinking_block:
  enabled_by_default: false
  toggle_key: "ctrl+o"
  refresh_rate: 10
  max_lines_display: 50
  panel_title: "思考过程 / Reasoning Process"
  panel_border_style: "yellow"

# 状态栏配置 / Status Bar Configuration
statusline:
  enabled: true
  default_format: "AloneChat | {model}"
  available_variables:
    - "{model}"
    - "{tokens}"
    - "{session}"
    - "{mode}"
    - "{cwd}"

# Vim模式配置 / Vim Mode Configuration
vim:
  enabled: false
  default_mode: "normal"
  enhanced_bindings:
    - "y"
    - "p"
    - "P"
    - ">>"
    - "<<"
    - "J"
    - ";"
    - ","
  undo_stack_size: 100

# 提示建议配置 / Prompt Suggestion Configuration
suggestions:
  enabled: true
  max_suggestions: 5
  tab_behavior: "accept_and_edit"
  enter_behavior: "submit_directly"
  show_hints: true
  command_autocomplete: true

# IME支持配置 / IME Support Configuration
ime:
  enabled: true
  cursor_tracking: true
  windows_support: true
  unix_support: true
