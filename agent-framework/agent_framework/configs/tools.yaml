# 工具系统配置 - Tools Configuration
# 定义工具的启用状态、权限和安全设置 / Defines tool enable status, permissions and security settings

# Shell工具配置 - Shell tool configuration
shell:
  enabled: true
  timeout: 30
  max_output: 100000
  whitelist:
    - "ls"
    - "cat"
    - "grep"
    - "find"
    - "head"
    - "tail"
    - "wc"
    - "sort"
    - "uniq"
    - "echo"
    - "pwd"
    - "which"
    - "whereis"
    - "type"
    - "date"
    - "whoami"
    - "git"
    - "python"
    - "node"
    - "npm"
    - "pip"
    - "cargo"
    - "go"
  blacklist:
    - "rm -rf"
    - "rm -r"
    - "sudo"
    - "su"
    - "chmod 777"
    - "chown"
    - "mkfs"
    - "dd"
    - "format"
    - "del /"
    - "rmdir /s"
    - "> /dev/"
    - "mv /*"
    - "cp /*"

# 文件工具配置 - File tools configuration
file:
  enabled: true
  read:
    enabled: true
    max_file_size: 10485760  # 10MB
    allowed_extensions:
      - ".py"
      - ".js"
      - ".ts"
      - ".tsx"
      - ".jsx"
      - ".java"
      - ".go"
      - ".rs"
      - ".c"
      - ".cpp"
      - ".h"
      - ".hpp"
      - ".md"
      - ".txt"
      - ".json"
      - ".yaml"
      - ".yml"
      - ".toml"
      - ".xml"
      - ".html"
      - ".css"
      - ".scss"
      - ".sql"
      - ".sh"
      - ".bat"
  write:
    enabled: true
    backup_enabled: true
    max_file_size: 10485760  # 10MB
  edit:
    enabled: true
    max_replacements: 100
  delete:
    enabled: true
    require_confirmation: true
    protected_paths:
      - ".git"
      - "node_modules"
      - "venv"
      - ".env"
  search:
    enabled: true
    default_engine: "ripgrep"  # ripgrep or grep
    max_results: 100

# Git工具配置 - Git tools configuration
git:
  enabled: true
  status:
    enabled: true
  diff:
    enabled: true
    max_diff_size: 100000
  commit:
    enabled: true
    require_confirmation: true
    auto_add: false
  branch:
    enabled: true
    protected_branches:
      - "main"
      - "master"
      - "production"
      - "staging"

# 工具分类 - Tool categories
categories:
  shell:
    description: "Shell命令执行 / Shell command execution"
    icon: "💻"
    color: "yellow"
    default_permission: "execute"
  file:
    description: "文件操作 / File operations"
    icon: "📁"
    color: "blue"
    default_permission: "read"
  git:
    description: "Git版本控制 / Git version control"
    icon: "🔀"
    color: "green"
    default_permission: "read"
  web:
    description: "网络操作 / Web operations"
    icon: "🌐"
    color: "purple"
    default_permission: "read"
  code:
    description: "代码操作 / Code operations"
    icon: "📝"
    color: "cyan"
    default_permission: "read"
  general:
    description: "通用工具 / General tools"
    icon: "🔧"
    color: "gray"
    default_permission: "read"

# 权限级别 - Permission levels
permissions:
  read:
    description: "只读操作 / Read-only operations"
    requires_confirmation: false
  write:
    description: "写入操作 / Write operations"
    requires_confirmation: true
  execute:
    description: "执行操作 / Execute operations"
    requires_confirmation: true
  dangerous:
    description: "危险操作 / Dangerous operations"
    requires_confirmation: true
    show_warning: true

# 工具执行设置 - Tool execution settings
execution:
  default_timeout: 30
  max_concurrent: 5
  retry_count: 3
  retry_delay: 1
  log_execution: true
  log_level: "INFO"

# 审批设置 - Approval settings
approval:
  enabled: true
  timeout_seconds: 300
  remember_choice: true
  batch_approval: true
  show_preview: true
  preview_lines: 10

# 安全设置 - Security settings
security:
  sandbox_enabled: false
  allowed_paths: []
  blocked_paths:
    - "/etc"
    - "/sys"
    - "/proc"
    - "C:\\Windows\\System32"
  env_isolation: false
  restricted_env_vars:
    - "PASSWORD"
    - "SECRET"
    - "API_KEY"
    - "TOKEN"
