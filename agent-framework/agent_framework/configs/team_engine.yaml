team_engine:
  max_retries: 3
  verification_threshold: 0.8
  worker_timeout: 300
  verifier_timeout: 60
  parallel_workers: 4
  max_adversarial_rounds: 5
  state_machine_logging: true
  deterministic_scheduling: true

roles:
  leader:
    model: "deepseek-v4"
    system_prompt_template: "leader_prompt.yaml"
    capabilities:
      - plan
      - dispatch
      - aggregate
      - coordinate
    tools: []
    priority: high

  worker:
    model: "deepseek-v4-flash"
    system_prompt_template: "worker_prompt.yaml"
    capabilities:
      - execute
      - report
      - debug
    tools:
      - file_read
      - file_write
      - shell
    priority: medium

  verifier:
    model: "deepseek-v4"
    system_prompt_template: "verifier_prompt.yaml"
    capabilities:
      - verify
      - reject
      - score
    tools:
      - file_read
      - test_run
    priority: high

communication:
  message_queue_size: 1000
  history_retention: 1000
  retry_on_failure: true
  timeout_ms: 5000

verification:
  quality_threshold: 0.8
  auto_approve_threshold: 0.95
  max_adversarial_rounds: 5
  partial_approval_enabled: true
  feedback_required: true

failure_recovery:
  local_retry_enabled: true
  global_retry_enabled: false
  fallback_to_leader: true
  error_notification: true

monitoring:
  metrics_enabled: true
  trace_enabled: true
  status_update_interval_ms: 1000
