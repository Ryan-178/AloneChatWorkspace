default_mode: default

allowed_tools:
  - Read
  - Glob
  - Grep
  - LS

denied_tools:
  - Delete
  - Write
  - Edit

rules:
  - tool_pattern: "Bash"
    action: "allow"
    command_pattern: "npm *"
    allowed:
      - "npm install"
      - "npm run"
    denied: []

  - tool_pattern: "Bash"
    action: "allow"
    command_pattern: "git * main"
    allowed:
      - "git checkout main"
      - "git merge main"
    denied: []

  - tool_pattern: "Bash"
    action: "allow"
    command_pattern: "python:*"
    allowed:
      - "python script.py > out"
      - "python script.py | tee output.log"
    denied: []

  - tool_pattern: "Bash"
    action: "allow"
    command_pattern: "pip install *"
    allowed:
      - "pip install requests"
      - "pip install flask"
    denied: []

  - tool_pattern: "Bash"
    action: "deny"
    command_pattern: "rm -rf /*"
    denied: []

tool_redirect_patterns:
  Bash:
    - pattern: "python:*"
      description: "Python script with output redirection e.g. python script.py > out"
    - pattern: "npm *"
      description: "Any npm command"
    - pattern: "git *"
      description: "Any git command"
