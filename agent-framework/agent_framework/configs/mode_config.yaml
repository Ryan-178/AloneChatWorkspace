# 交互模式配置 - Interaction Mode Configuration
# 定义三种交互模式的行为和权限 / Defines behavior and permissions for three interaction modes

modes:
  # 只读探索模式 - Read-only exploration mode
  plan:
    auto_approve_tools: false
    allowed_tools:
      - "read"
      - "search"
      - "list"
      - "file_read"
      - "file_search"
      - "web_search"
      - "grep"
      - "ls"
      - "cat"
    require_confirmation: []
    max_auto_approve_cost: 0.0
    description: "只读探索模式，无工具执行 / Read-only exploration mode, no tool execution"
    icon: "🔍"
    color: "blue"
    system_prompt_addon: |
      You are in PLAN mode. You can only read and search files, but cannot modify anything.
      Focus on understanding the codebase and providing analysis.
      你处于PLAN模式。你只能读取和搜索文件，但不能修改任何内容。
      专注于理解代码库并提供分析。

  # 默认交互模式 - Default interaction mode
  agent:
    auto_approve_tools: false
    allowed_tools: []  # 空列表表示允许所有工具 / Empty list means all tools allowed
    require_confirmation:
      - "shell"
      - "file_write"
      - "file_delete"
      - "file_edit"
      - "git_commit"
      - "git_push"
    max_auto_approve_cost: 1.0
    description: "默认交互模式，工具执行需审批 / Default interaction mode, tool execution requires approval"
    icon: "🤖"
    color: "green"
    system_prompt_addon: |
      You are in AGENT mode. You can use tools, but dangerous operations require user confirmation.
      Always explain what you're going to do before executing dangerous operations.
      你处于AGENT模式。你可以使用工具，但危险操作需要用户确认。
      在执行危险操作之前，请先解释你要做什么。

  # 自动批准模式 - Auto-approve mode
  yolo:
    auto_approve_tools: true
    allowed_tools: []  # 空列表表示允许所有工具 / Empty list means all tools allowed
    require_confirmation: []
    max_auto_approve_cost: 10.0
    description: "自动批准模式，信任工作区 / Auto-approve mode, trust workspace"
    icon: "🚀"
    color: "yellow"
    system_prompt_addon: |
      You are in YOLO mode. All tools are auto-approved. Work efficiently without asking for confirmation.
      Be careful with destructive operations, but proceed confidently.
      你处于YOLO模式。所有工具都自动批准。高效工作，无需请求确认。
      对破坏性操作要小心，但要自信地进行。

# 默认模式 - Default mode
default_mode: "agent"

# 工具分类 - Tool categories
# 用于确定工具的危险程度 / Used to determine tool danger level
tool_categories:
  safe:
    - "read"
    - "search"
    - "list"
    - "file_read"
    - "file_search"
    - "web_search"
    - "calculator"
    - "current_time"
  
  moderate:
    - "file_write"
    - "file_edit"
    - "git_status"
    - "git_diff"
    - "git_branch"
  
  dangerous:
    - "shell"
    - "file_delete"
    - "git_commit"
    - "git_push"
    - "git_reset"

# 审批超时设置 - Approval timeout settings
approval:
  timeout_seconds: 300  # 5分钟无响应自动拒绝 / Auto-reject after 5 minutes
  remember_choice: true  # 记住用户选择 / Remember user choice
  batch_approval: true  # 允许批量批准 / Allow batch approval

# 快捷键绑定 - Keyboard shortcuts
shortcuts:
  toggle_mode: "Ctrl+M"  # 切换模式 / Toggle mode
  plan_mode: "Ctrl+Shift+P"  # PLAN模式 / PLAN mode
  agent_mode: "Ctrl+Shift+A"  # AGENT模式 / AGENT mode
  yolo_mode: "Ctrl+Shift+Y"  # YOLO模式 / YOLO mode
