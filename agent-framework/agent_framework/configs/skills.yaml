skills:
  document_generation:
    name: "document_generation"
    description: "生成各类专业文档，支持Markdown、Word、PDF等格式"
    version: "1.0.0"
    author: "system"
    category: "document"
    tags:
      - "document"
      - "generation"
      - "writing"
    dependencies: []
    templates:
      report: "# {title}\n\n## 概述\n\n{summary}\n\n## 详细内容\n\n{content}\n\n## 结论\n\n{conclusion}"
      proposal: "# {title}\n\n## 背景\n\n{background}\n\n## 方案\n\n{solution}\n\n## 预期效果\n\n{expected}"

  data_analysis:
    name: "data_analysis"
    description: "执行数据分析，包括统计计算、趋势分析、可视化"
    version: "1.0.0"
    author: "system"
    category: "data"
    tags:
      - "data"
      - "analysis"
      - "statistics"
    dependencies: []

  web_research:
    name: "web_research"
    description: "执行网络信息搜索和整理"
    version: "1.0.0"
    author: "system"
    category: "research"
    tags:
      - "research"
      - "search"
      - "web"
    dependencies: []
    default_num_results: 5

  ppt_generation:
    name: "ppt_generation"
    description: "自动生成演示文稿"
    version: "1.0.0"
    author: "system"
    category: "document"
    tags:
      - "ppt"
      - "presentation"
      - "slides"
    dependencies: []
    default_slides:
      - title: "封面"
        content: "{title}"
      - title: "概述"
        content: "内容概述"
      - title: "总结"
        content: "谢谢观看"

  report_generation:
    name: "report_generation"
    description: "生成专业分析报告"
    version: "1.0.0"
    author: "system"
    category: "document"
    tags:
      - "report"
      - "analysis"
      - "document"
    dependencies: []

categories:
  document:
    description: "文档处理相关技能"
    skills:
      - "document_generation"
      - "ppt_generation"
      - "report_generation"
  data:
    description: "数据分析相关技能"
    skills:
      - "data_analysis"
  research:
    description: "信息调研相关技能"
    skills:
      - "web_research"
