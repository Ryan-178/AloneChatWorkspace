# AloneChat CLI 增强配置 / AloneChat CLI Enhancements Configuration

worktree:
  # 工作树基础目录 / Worktree base directory
  base_dir: ".alonechat/worktrees"
  # 工作树前缀 / Worktree prefix
  prefix: "session_"
  # 自动清理旧工作树 / Auto cleanup old worktrees
  auto_cleanup: true
  # 工作树最大保留天数 / Max retention days for worktrees
  max_age_days: 7
  # 稀疏检出路径 / Sparse checkout paths
  # 仅检出需要的目录以减少开销 / Only checkout needed directories to reduce overhead
  sparse_paths:
    - src/
    - configs/
    - tests/
    - pyproject.toml
    - "*.yaml"
    - "*.yml"

claude_md:
  # CLAUDE.md 文件名 / CLAUDE.md filename
  filename: "CLAUDE.md"
  # 从附加目录加载 CLAUDE.md 的环境变量 / Env var for loading CLAUDE.md from add-dir
  additional_dirs_env_var: "CLAUDE_CODE_ADDITIONAL_DIRECTORIES_CLAUDE_MD"
  # 是否默认启用附加目录 CLAUDE.md 加载 / Whether to enable add-dir CLAUDE.md loading by default
  additional_dirs_enabled: true
  # 支持的导入扩展名 / Supported import extensions
  import_extensions:
    - ".md"
    - ".txt"
    - ".yaml"
    - ".yml"
    - ".json"
    - ".toml"

rules:
  # .claude/rules/ 目录名称 / .claude/rules/ directory name
  rules_dir: ".claude/rules"
  # 条件性规则模式 / Conditional rule patterns
  # 文件名格式: {condition}.md, 例如 / Filename format: {condition}.md, e.g.
  # - always.md: 始终加载 / Always loaded
  # - python.md: 仅当项目包含Python文件时加载 / Loaded when Python files detected
  condition_patterns:
    always: "always.md"
    language: "{language}.md"
    framework: "{framework}.md"
    directory: "{directory}.md"

skills:
  # 嵌套技能发现目录 / Nested skill discovery directories
  discovery_dirs:
    - ".claude/skills"
    - ".skills"
  # 技能定义文件名 / Skill definition filename
  skill_def_file: "SKILL.md"
  # 最大嵌套深度 / Max nesting depth
  max_depth: 3

additional_dirs:
  # 配置文件搜索模式 / Config file search patterns
  config_patterns:
    - "enabledPlugins.yaml"
    - "enabledPlugins.yml"
    - ".alonechatrc"
    - ".alonechatrc.yaml"
  # 可加载的资源类型 / Loadable resource types
  resource_types:
    skills: "skills"
    plugins: "plugins"
    commands: "commands"
    models: "models"
    config: "config"
  # 环境变量名 / Environment variable name
  env_var: "ALONECHAT_ADDITIONAL_DIRECTORIES"
