lsp:
  enabled: true
  servers:
    python:
      command: "pyright-langserver"
      args: ["--stdio"]
      description: "Python language server (pyright)"
    typescript:
      command: "typescript-language-server"
      args: ["--stdio"]
      description: "TypeScript/JavaScript language server"
    javascript:
      command: "typescript-language-server"
      args: ["--stdio"]
      description: "JavaScript language server"
    go:
      command: "gopls"
      args: []
      description: "Go language server"
    rust:
      command: "rust-analyzer"
      args: []
      description: "Rust language server"
    java:
      command: "jdtls"
      args: []
      description: "Java language server (Eclipse JDT)"
    csharp:
      command: "omnisharp"
      args: ["-lsp"]
      description: "C# language server (OmniSharp)"
    cpp:
      command: "clangd"
      args: []
      description: "C/C++ language server (clangd)"
    c:
      command: "clangd"
      args: []
      description: "C language server (clangd)"
    ruby:
      command: "solargraph"
      args: ["stdio"]
      description: "Ruby language server (Solargraph)"
    php:
      command: "intelephense"
      args: ["--stdio"]
      description: "PHP language server (Intelephense)"
    lua:
      command: "lua-language-server"
      args: []
      description: "Lua language server"
  diagnostics:
    debounce_ms: 500
    max_diagnostics: 100
    show_related_info: true
    show_code_actions: true
  features:
    completion: true
    hover: true
    signature_help: true
    definition: true
    references: true
    rename: true
    code_action: true
