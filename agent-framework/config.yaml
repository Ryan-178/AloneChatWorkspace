# Agent Framework Configuration
# 生产级Agent网关系统配置文件

# 全局配置
debug: false
data_dir: ./data

# 模式管理配置 / Mode Management Configuration
# 控制CODE模式和WORK模式的切换行为
mode:
  default_mode: MTC  # 默认模式: MTC（Work）或 CODE / Default mode: MTC (Work) or CODE
  allow_mode_switch: true  # 是否允许模式切换 / Whether to allow mode switching
  auto_detect_mode: true  # 是否自动检测任务适合的模式 / Whether to auto-detect suitable mode
  prefer_user_choice: true  # 用户显式选择优先 / Prefer user explicit choice
  
  # CODE模式配置 (使用codex-sdk-python) / CODE mode config (uses codex-sdk-python)
  code_config:
    use_codex_bridge: true  # 使用CodexBridge连接codex-sdk-python / Use CodexBridge with codex-sdk-python
    enable_search_agent: true  # 启用代码搜索子Agent / Enable code search sub-agent
    enable_plan_mode: true  # 启用规划模式 / Enable plan mode
    max_context_tokens: 128000  # 最大上下文token数 / Max context tokens
    sandbox_mode: workspace-write  # 沙箱模式 / Sandbox mode
    approval_policy: on-request  # 审批策略 / Approval policy
    sdk_model: o4-mini  # Codex SDK使用的模型 / Model used by Codex SDK
  
  # MTC 模式配置 (对应 Work 模式，使用自研 MTCAgent)
  # MTC mode config (maps to Work mode, uses self-developed MTCAgent)
  mtc_config:
    intent_clarification_enabled: true  # 启用意图澄清 / Enable intent clarification
    max_clarification_questions: 3  # 最大追问问题数 / Max clarification questions
    sandbox_root: ./workspace/mtc  # 工作模式沙箱根目录 / Work mode sandbox root
    allowed_file_extensions:
      - .txt
      - .md
      - .pdf
      - .docx
      - .xlsx
      - .pptx
      - .csv
      - .json
      - .html
    output_formats:
      - markdown
      - pdf
      - pptx
      - xlsx
      - docx

# 路由器配置 / Router Configuration
router:
  enable_auto_routing: true  # 启用自动路由 / Enable auto routing
  code_mode_threshold: 0.6  # CODE模式置信度阈值 / CODE mode confidence threshold
  work_mode_threshold: 0.6  # WORK模式置信度阈值 / WORK mode confidence threshold

# LLM配置
llm:
  provider: openai
  model: gpt-4o
  api_key: null  # 从环境变量读取
  api_base: null
  temperature: 0.7
  max_tokens: 4096
  timeout: 30.0
  max_retries: 3
  retry_delay: 1.0

# 内存配置
memory:
  window_size: 10
  vector_db_type: chromadb
  vector_db_path: ./data/chroma
  embedding_model: text-embedding-ada-002
  enable_persistence: true

# Gateway配置
gateway:
  host: 0.0.0.0
  port: 8787
  session_timeout: 3600
  max_sessions: 1000
  enable_cors: true
  cors_origins:
    - "*"
  enable_health_check: true
  health_check_path: /health

# 日志配置
logging:
  level: INFO
  format: colored  # colored or json
  file_path: null  # null表示只输出到控制台
  max_file_size: 10485760  # 10MB
  backup_count: 5

# 指标配置
metrics:
  enabled: true
  export_interval: 60
  export_path: null
  enable_prometheus: false
  prometheus_port: 9090

# 追踪配置
tracing:
  enabled: true
  sample_rate: 1.0
  export_path: null
  enable_zipkin: false
  zipkin_endpoint: null

# MCP配置
mcp:
  enabled: true
  lazy_load_tools: false
  auto_lazy_load_threshold: 0.1
  servers:
    - name: "filesystem"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-filesystem", "./data"]
      env: {}
      auto_start: false
      description: "文件系统访问工具"
      timeout: 30
      transport: "stdio"
    - name: "brave-search"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-brave-search"]
      env:
        BRAVE_API_KEY: "${BRAVE_API_KEY}"
      auto_start: false
      description: "Brave搜索工具"
      timeout: 30
      transport: "stdio"
    - name: "slack-example"
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-slack"]
      env: {}
      auto_start: false
      description: "Slack MCP服务器（OAuth示例）"
      timeout: 30
      transport: "stdio"
      client_id: "${SLACK_CLIENT_ID}"
      client_secret: "${SLACK_CLIENT_SECRET}"
    - name: "sse-example"
      command: ""
      args: []
      env: {}
      auto_start: false
      description: "SSE传输示例"
      timeout: 30
      transport: "sse"
      url: "http://localhost:3001/mcp"
  default_timeout: 30
  max_concurrent_calls: 10
  auto_register_tools: true
